<h2 class="sr-only">Interactive walkthrough of the seven Software Development Life Cycle phases, illustrated using a real example of building a college canteen pre-order app.</h2>
<style>
.sdlc-wrap { font-family: var(--font-sans); }
.sdlc-dots { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.sdlc-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-border-secondary); border: none; cursor: pointer; padding: 0; transition: background .2s, transform .2s; }
.sdlc-dot.active { background: var(--color-text-info); transform: scale(1.3); }
.sdlc-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.25rem 1rem; min-height: 280px; }
.sdlc-tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: var(--border-radius-md); margin-bottom: 10px; }
.sdlc-title { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
.sdlc-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 14px; }
.sdlc-block { margin-bottom: 12px; }
.sdlc-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
.sdlc-body { font-size: 14px; line-height: 1.6; margin: 0; }
.sdlc-example { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 13px; line-height: 1.6; }
.sdlc-nav { display: flex; justify-content: space-between; margin-top: 1rem; gap: 10px; }
.sdlc-nav button { flex: 1; }
.sdlc-ask { font-size: 12px; margin-top: 10px; background: none; border: none; color: var(--color-text-info); cursor: pointer; padding: 0; text-align: left; }
</style>
<div class="sdlc-wrap">
  <div class="sdlc-dots" id="dots"></div>
  <div class="sdlc-card" id="card"></div>
  <div class="sdlc-nav">
    <button onclick="go(-1)"><i class="ti ti-arrow-left" aria-hidden="true" style="vertical-align:-2px;margin-right:4px"></i>Previous</button>
    <button onclick="go(1)" id="nextBtn">Next<i class="ti ti-arrow-right" aria-hidden="true" style="vertical-align:-2px;margin-left:4px"></i></button>
  </div>
</div>
<script>
const phases = [
  {
    tag: "the problem", color: "gray",
    title: "Why we need an SDLC at all",
    sub: "Before phase 1, meet the project",
    what: "Students at a college canteen lose 15 to 20 minutes standing in a lunch queue every day, and the canteen owner often over cooks or under cooks food because nobody knows demand in advance. The college wants an app where students pre order and pre pay, and the canteen sees orders coming in live.",
    example: "This single problem will travel through every phase below: planning it, designing it, building it, testing it, launching it, and maintaining it. Notice how each phase hands off a concrete output to the next one.",
    ask: "Why can't we just start coding this app right away?"
  },
  {
    tag: "phase 1", color: "purple",
    title: "Planning and requirement analysis",
    sub: "Figure out what to build and why",
    what: "The team talks to everyone affected, students, canteen staff, and the college administration, to pin down what the app must do, what it must avoid, the budget, the timeline, and the risks. The output is a requirements document everyone agrees on before any design or code happens.",
    example: "For the canteen app, the team interviews 30 students and the canteen owner. They learn students want to pre order between 10 and 11 AM and pick up by name, while the owner needs a live dashboard of incoming orders and wants payment collected upfront to cut food waste.",
    ask: "What happens if the planning phase is rushed or skipped?"
  },
  {
    tag: "phase 2", color: "purple",
    title: "Feasibility study",
    sub: "Check if the idea is actually viable",
    what: "Before committing resources, the team checks four angles: technical (do we have the skills and tools), economic (does the cost make sense against the benefit), legal (any compliance issues, like handling student payments), and operational (will staff and students actually use it day to day).",
    example: "For the canteen app, the team confirms a small team can build it in eight weeks using a basic mobile app plus a simple payment gateway, the cost is well within the college's budget, and the canteen owner agrees to use a tablet at the counter to view orders.",
    ask: "What is the difference between technical and operational feasibility?"
  },
  {
    tag: "phase 3", color: "teal",
    title: "System design",
    sub: "Turn requirements into a blueprint",
    what: "Architects and senior developers decide how the system will be structured: the database schema, the screens, the technology stack, and how components talk to each other. This phase produces design documents and diagrams that programmers will follow, without writing the actual application code yet.",
    example: "For the canteen app, the team designs a database with tables for students, menu items, and orders, sketches the order screen and the canteen dashboard, and decides to build it as a simple mobile app with a cloud backend so it can scale during exam season rush.",
    ask: "What is the difference between high level design and low level design?"
  },
  {
    tag: "phase 4", color: "teal",
    title: "Implementation (coding)",
    sub: "Developers write the actual program",
    what: "Programmers translate the design documents into working code, usually splitting the system into modules that different developers or teams build in parallel, following agreed coding standards so the pieces fit together cleanly later.",
    example: "For the canteen app, one developer builds the student ordering screen, another builds the payment integration, and a third builds the canteen owner's live order dashboard, all working from the same database schema decided in the design phase.",
    ask: "How do teams avoid breaking each other's code when working in parallel?"
  },
  {
    tag: "phase 5", color: "coral",
    title: "Testing",
    sub: "Find and fix what's broken before users do",
    what: "Testers and developers verify the software actually does what the requirements said, hunting for bugs through several layers: testing individual modules, testing how modules work together, and testing the complete system against real use cases.",
    example: "For the canteen app, testers place test orders to check the payment really deducts correctly, try ordering with a poor network connection, and check that the canteen dashboard updates instantly when ten students order at the same time during a simulated lunch rush.",
    ask: "What's the difference between unit testing and integration testing?"
  },
  {
    tag: "phase 6", color: "coral",
    title: "Deployment",
    sub: "Release the software to real users",
    what: "The tested software is released to actual users, often gradually rather than all at once, so problems surface with a small group before everyone depends on it. A rollback plan stays ready in case something goes wrong after release.",
    example: "For the canteen app, the college first releases it to one hostel block for a week as a pilot, watches for crashes or payment failures, then rolls it out to the entire campus once the pilot week passes without major issues.",
    ask: "Why release to a small group first instead of everyone at once?"
  },
  {
    tag: "phase 7", color: "amber",
    title: "Maintenance",
    sub: "Keep it working, then keep it improving",
    what: "After launch, the team fixes bugs that slipped through, patches security issues, adapts the software to changes like a new payment provider, and adds features users ask for. This phase runs for the entire useful life of the software and often surfaces new requirements, looping back into planning.",
    example: "For the canteen app, students start requesting a feature to reorder their favourite meal in one tap, and the canteen wants a way to mark items sold out during the rush. Both requests loop back into a fresh, smaller planning and design cycle.",
    ask: "Why does maintenance loop back into planning instead of being the final step?"
  }
];

let idx = 0;
const dotsEl = document.getElementById('dots');
const cardEl = document.getElementById('card');
const nextBtn = document.getElementById('nextBtn');

phases.forEach((_, i) => {
  const b = document.createElement('button');
  b.className = 'sdlc-dot' + (i === 0 ? ' active' : '');
  b.setAttribute('aria-label', 'Go to step ' + (i + 1));
  b.onclick = () => { idx = i; render(); };
  dotsEl.appendChild(b);
});

function render() {
  const p = phases[idx];
  cardEl.innerHTML = `
    <span class="sdlc-tag c-${p.color}" style="background:var(--color-background-primary)">${p.tag}</span>
    <p class="sdlc-title">${p.title}</p>
    <p class="sdlc-sub">${p.sub}</p>
    <div class="sdlc-block">
      <p class="sdlc-label">What happens here</p>
      <p class="sdlc-body">${p.what}</p>
    </div>
    <div class="sdlc-block">
      <p class="sdlc-label">Canteen app example</p>
      <div class="sdlc-example">${p.example}</div>
    </div>
    <button class="sdlc-ask" onclick="sendPrompt('${p.ask.replace(/'/g, "\\'")}')">${p.ask} <i class="ti ti-arrow-right" aria-hidden="true" style="font-size:11px"></i></button>
  `;
  document.querySelectorAll('.sdlc-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  nextBtn.innerHTML = idx === phases.length - 1
    ? 'Back to start <i class="ti ti-refresh" aria-hidden="true" style="vertical-align:-2px;margin-left:4px"></i>'
    : 'Next<i class="ti ti-arrow-right" aria-hidden="true" style="vertical-align:-2px;margin-left:4px"></i>';
}

function go(dir) {
  idx = (idx + dir + phases.length) % phases.length;
  render();
}

render();
</script>
